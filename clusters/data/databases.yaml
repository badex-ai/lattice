version: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata: 
  name: databases
  namespace: flux-system
spec: 
  dependsOn: 
    - name: infra-controllers
  interval: 1h
  retryInterval: 2m
  timeout: 10m
  sourceRef: 
    kind: GitRepository
    name: flux-system
  path: ./database/data
  prune: true
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age

